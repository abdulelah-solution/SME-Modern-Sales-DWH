version: 2

models:
  - name: int_crm_erp_customers_joined
    description: >
      A unified intermediate model that integrates customer data from both CRM and ERP systems.
      It serves as a single source of truth for customer profiles by joining demographic info from the CRM with legal and location attributes from the ERP, ensuring a 360-degree view of the customer.
    columns:
      - name: customer_key
        description: >
          A surrogate key generated using a hash of the customer number and source system.
          It provides a unique, immutable identifier for each customer across both CRM and ERP systems, serving as the primary join key for dimension tables.
        data_tests: [unique, not_null]

      - name: customer_number
        description: >
          The original natural identifier assigned to the customer in the source system.
          This field is retained to allow for easy cross-referencing and auditing against the source CRM/ERP records.
        data_tests: [unique, not_null]

  - name: int_crm_erp_products_joined
    description: >
      Integrated product model that reconciles product master data from CRM with category hierarchies and metadata from the ERP.
      This model resolves any discrepancies between systems to provide a consolidated product catalog for reporting.
    columns:
      - name: product_key
        description: >
          A surrogate key created by hashing the product identifier and its source.
          This key ensures that each product is uniquely identifiable in the data warehouse, even if identical product codes exist across different source systems.
        data_tests: [unique, not_null]

      - name: product_number
        description: >
          The business-facing product code or SKU as defined in the source system.
          It is used for searching, filtering, and verifying product information during reconciliation with the source database.
        data_tests: [unique, not_null]
        
  - name: int_crm_sales_joined
    description: >
      A comprehensive sales transaction model that enriches raw CRM sales details with relevant dimensional context.
      This intermediate layer prepares the transactional data for final fact table modeling by ensuring all business logic and joins are pre-calculated.
    columns:
      - name: sales_key
        description: >
          A granular surrogate key representing a unique sales line item.
          It is generated by hashing a combination of the order number, product ID, and source system to ensure every transaction record has a distinct, traceable identity for fact table modeling.
        data_tests: [unique, not_null]